<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <radialGradient id="inner_core_bg" cx="50%" cy="45%">
      <stop offset="0%" stop-color="#ffffc0"/>
      <stop offset="25%" stop-color="#ffd060"/>
      <stop offset="55%" stop-color="#e08020"/>
      <stop offset="80%" stop-color="#c05010"/>
      <stop offset="100%" stop-color="#601808"/>
    </radialGradient>
    <radialGradient id="glow_core" cx="50%" cy="45%">
      <stop offset="0%" stop-color="#ffffcc" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffaa20" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff4000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="crystal_axis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80d0ff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#40a0e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#80d0ff" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="core_glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft_glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo oscuro profundo -->
  <rect width="480" height="320" fill="#0a0500"/>

  <!-- Halo exterior (glow del calor) -->
  <circle cx="240" cy="160" r="155" fill="url(#glow_core)" filter="url(#core_glow)"/>

  <!-- Núcleo interno principal -->
  <circle cx="240" cy="160" r="128" fill="url(#inner_core_bg)"/>
  <circle cx="240" cy="160" r="128" fill="none" stroke="#ffd060" stroke-width="2" opacity="0.4"/>

  <!-- ESTRUCTURA CRISTALINA HCP (Hexagonal Compacta) del hierro-ε -->
  <!-- Representación de la red cristalina sobre el núcleo -->

  <!-- Capa A del cristal hcp (arriba) -->
  <g opacity="0.55">
    <polygon points="240,58 264,72 264,100 240,114 216,100 216,72" fill="rgba(255,230,100,0.2)" stroke="#ffd060" stroke-width="1.5"/>
    <!-- Átomos capa A -->
    <circle cx="240" cy="58"  r="7" fill="#ffe080" filter="url(#soft_glow)"/>
    <circle cx="264" cy="72"  r="7" fill="#ffe080" filter="url(#soft_glow)"/>
    <circle cx="264" cy="100" r="7" fill="#ffe080" filter="url(#soft_glow)"/>
    <circle cx="240" cy="114" r="7" fill="#ffe080" filter="url(#soft_glow)"/>
    <circle cx="216" cy="100" r="7" fill="#ffe080" filter="url(#soft_glow)"/>
    <circle cx="216" cy="72"  r="7" fill="#ffe080" filter="url(#soft_glow)"/>
    <!-- Átomo central A -->
    <circle cx="240" cy="86"  r="8" fill="#ffc040" filter="url(#soft_glow)"/>
  </g>

  <!-- Capa B del cristal hcp (intermedia) -->
  <g opacity="0.45">
    <polygon points="240,130 264,144 264,172 240,186 216,172 216,144" fill="rgba(255,200,80,0.2)" stroke="#ffb040" stroke-width="1.5"/>
    <circle cx="240" cy="130" r="7" fill="#ffb040"/>
    <circle cx="264" cy="144" r="7" fill="#ffb040"/>
    <circle cx="264" cy="172" r="7" fill="#ffb040"/>
    <circle cx="240" cy="186" r="7" fill="#ffb040"/>
    <circle cx="216" cy="172" r="7" fill="#ffb040"/>
    <circle cx="216" cy="144" r="7" fill="#ffb040"/>
    <circle cx="240" cy="158" r="8" fill="#ff9020"/>
  </g>

  <!-- Capa C del cristal hcp (abajo) -->
  <g opacity="0.35">
    <polygon points="240,202 264,216 264,244 240,258 216,244 216,216" fill="rgba(255,160,40,0.2)" stroke="#ff9020" stroke-width="1.5"/>
    <circle cx="240" cy="202" r="7" fill="#ff9020"/>
    <circle cx="264" cy="216" r="7" fill="#ff9020"/>
    <circle cx="264" cy="244" r="7" fill="#ff9020"/>
    <circle cx="240" cy="258" r="7" fill="#ff9020"/>
    <circle cx="216" cy="244" r="7" fill="#ff9020"/>
    <circle cx="216" cy="216" r="7" fill="#ff9020"/>
    <circle cx="240" cy="230" r="8" fill="#e07010"/>
  </g>

  <!-- Eje cristalino principal (c-axis) — dirección de anisotropía -->
  <line x1="240" y1="18" x2="240" y2="302" stroke="url(#crystal_axis)" stroke-width="3" opacity="0.7"/>
  <circle cx="240" cy="18"  r="5" fill="#80d0ff" opacity="0.8"/>
  <circle cx="240" cy="302" r="5" fill="#80d0ff" opacity="0.8"/>

  <!-- Flechas de rotación diferencial -->
  <path d="M112,155 Q115,125 130,110 Q148,95 165,98" fill="none" stroke="#60e080" stroke-width="2.5" opacity="0.8"/>
  <path d="M108,165 Q106,185 118,200 Q135,218 155,222" fill="none" stroke="#60e080" stroke-width="1.5" opacity="0.5"/>
  <!-- Cabeza de flecha izquierda -->
  <polygon points="165,93 155,103 175,108" fill="#60e080" opacity="0.8"/>

  <path d="M368,155 Q365,125 350,110 Q332,95 315,98" fill="none" stroke="#60e080" stroke-width="2.5" opacity="0.8"/>
  <polygon points="315,93 325,103 305,108" fill="#60e080" opacity="0.8"/>

  <!-- ETIQUETAS FUERA DEL CÍRCULO -->
  <!-- Eje c (anisotropía) -->
  <rect x="248" y="6" width="105" height="16" rx="3" fill="rgba(0,10,40,0.75)"/>
  <text x="252" y="17" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#80d0ff">Eje-c (anisotropía)</text>

  <rect x="248" y="298" width="105" height="16" rx="3" fill="rgba(0,10,40,0.75)"/>
  <text x="252" y="309" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#80d0ff">Vel. P polar &gt; ecuatorial</text>

  <!-- Súper-rotación -->
  <rect x="4" y="100" width="100" height="36" rx="5" fill="rgba(0,0,0,0.7)"/>
  <text x="8" y="114" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#60e080">Súper-rotación</text>
  <text x="8" y="128" font-family="system-ui,sans-serif" font-size="9" fill="#40c060">~0.3-0.5° / año</text>

  <!-- Datos físicos -->
  <rect x="4" y="145" width="100" height="60" rx="5" fill="rgba(0,0,0,0.7)"/>
  <text x="8" y="158" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#ffd060">Temperatura:</text>
  <text x="8" y="170" font-family="system-ui,sans-serif" font-size="9" fill="#c0a030">~6,000°C</text>
  <text x="8" y="184" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#ffd060">Presión:</text>
  <text x="8" y="196" font-family="system-ui,sans-serif" font-size="9" fill="#c0a030">329–364 GPa</text>

  <!-- Mineral label -->
  <rect x="352" y="106" width="122" height="36" rx="5" fill="rgba(0,0,0,0.7)"/>
  <text x="356" y="119" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#ffc040">Hierro-ε (épsilon)</text>
  <text x="356" y="131" font-family="system-ui,sans-serif" font-size="9" fill="#c09020">Fe hcp · 85%</text>
  <text x="356" y="140" font-family="system-ui,sans-serif" font-size="8" fill="#9a7010">Níquel Ni · 10%</text>

  <!-- Inner inner core (sugerencia) -->
  <circle cx="240" cy="160" r="38" fill="rgba(255,255,160,0.06)" stroke="#ffffa0" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <rect x="248" y="152" width="82" height="22" rx="4" fill="rgba(0,0,0,0.65)"/>
  <text x="252" y="162" font-family="system-ui,sans-serif" font-size="8.5" font-weight="700" fill="#ffffb0">Inner Inner Core</text>
  <text x="252" y="171" font-family="system-ui,sans-serif" font-size="8" fill="#c0c060">(~300 km · 2021)</text>

  <!-- Brillo especular del núcleo -->
  <ellipse cx="215" cy="130" rx="30" ry="18" fill="rgba(255,255,200,0.18)"/>

  <!-- Título -->
  <rect x="120" y="4" width="240" height="22" rx="5" fill="rgba(0,0,0,0.8)"/>
  <text x="240" y="18" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">Núcleo Interno — Cristal de Hierro</text>
</svg>
