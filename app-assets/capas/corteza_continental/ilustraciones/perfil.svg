<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#c8e6f5"/>
    </linearGradient>
    <linearGradient id="sedim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#a8894e"/>
    </linearGradient>
    <linearGradient id="granite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b896"/>
      <stop offset="100%" stop-color="#b89874"/>
    </linearGradient>
    <linearGradient id="basalt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a6858"/>
      <stop offset="100%" stop-color="#5a4840"/>
    </linearGradient>
    <linearGradient id="manto" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c87040"/>
      <stop offset="100%" stop-color="#a05020"/>
    </linearGradient>
    <pattern id="granite_pat" patternUnits="userSpaceOnUse" width="12" height="12">
      <rect width="12" height="12" fill="#c8a880"/>
      <circle cx="3" cy="3" r="1.5" fill="#a08060" opacity="0.6"/>
      <circle cx="9" cy="7" r="1" fill="#e0c098" opacity="0.5"/>
      <circle cx="6" cy="10" r="1.5" fill="#808060" opacity="0.4"/>
    </pattern>
    <pattern id="basalt_pat" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#6a5848"/>
      <rect x="1" y="1" width="3" height="3" fill="#584838" opacity="0.5"/>
      <rect x="6" y="5" width="3" height="3" fill="#7a6858" opacity="0.4"/>
    </pattern>
    <pattern id="manto_pat" patternUnits="userSpaceOnUse" width="14" height="14">
      <rect width="14" height="14" fill="#b06030"/>
      <ellipse cx="7" cy="7" rx="4" ry="2.5" fill="#d08040" opacity="0.4"/>
      <ellipse cx="0" cy="0" rx="3" ry="2" fill="#904010" opacity="0.3"/>
    </pattern>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Cielo -->
  <rect width="480" height="100" fill="url(#sky)"/>

  <!-- Nubes -->
  <ellipse cx="80" cy="30" rx="40" ry="14" fill="white" opacity="0.85"/>
  <ellipse cx="100" cy="24" rx="28" ry="12" fill="white" opacity="0.9"/>
  <ellipse cx="340" cy="45" rx="50" ry="13" fill="white" opacity="0.75"/>
  <ellipse cx="365" cy="38" rx="32" ry="11" fill="white" opacity="0.8"/>

  <!-- Montaña izquierda (Himalaya) -->
  <polygon points="20,100 110,32 180,100" fill="#8a9878"/>
  <polygon points="65,100 110,46 155,100" fill="#a0b08a"/>
  <!-- Nieve cima -->
  <polygon points="100,32 110,38 120,32 113,26 107,26" fill="white" opacity="0.95"/>

  <!-- Montaña derecha -->
  <polygon points="260,100 330,55 400,100" fill="#7a8868"/>
  <polygon points="295,100 330,68 365,100" fill="#8a9878"/>
  <polygon points="320,55 330,62 340,55 334,50 326,50" fill="white" opacity="0.9"/>

  <!-- Terreno llano -->
  <path d="M0,100 L20,100 Q60,96 90,100 Q130,104 160,100 Q200,96 240,100 Q280,104 300,100 Q350,96 400,100 Q440,103 480,100 L480,100" fill="#6a8040" stroke="none"/>

  <!-- Capa sedimentaria -->
  <rect x="0" y="100" width="480" height="38" fill="url(#sedim)"/>
  <!-- Líneas estratos sedimentarios -->
  <line x1="0" y1="110" x2="480" y2="112" stroke="#b89050" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="120" x2="480" y2="121" stroke="#a07840" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="130" x2="480" y2="131" stroke="#b89050" stroke-width="0.6" opacity="0.4"/>

  <!-- Capa granito (corteza superior) -->
  <rect x="0" y="138" width="480" height="70" fill="url(#granite_pat)"/>
  <!-- Textura granito (manchas) -->
  <circle cx="50" cy="158" r="5" fill="#908060" opacity="0.3"/>
  <circle cx="140" cy="170" r="7" fill="#c0a080" opacity="0.2"/>
  <circle cx="240" cy="155" r="6" fill="#806040" opacity="0.25"/>
  <circle cx="350" cy="175" r="8" fill="#a08060" opacity="0.2"/>
  <circle cx="430" cy="160" r="5" fill="#908060" opacity="0.3"/>

  <!-- Capa basalto (corteza inferior) -->
  <rect x="0" y="208" width="480" height="50" fill="url(#basalt_pat)"/>

  <!-- Línea del MOHO (discontinuidad) -->
  <line x1="0" y1="258" x2="480" y2="258" stroke="#ff6020" stroke-width="2.5" stroke-dasharray="12,6" opacity="0.9"/>

  <!-- Manto superior (visible debajo) -->
  <rect x="0" y="258" width="480" height="62" fill="url(#manto_pat)"/>
  <!-- Ondulaciones del manto -->
  <path d="M0,270 Q60,262 120,270 Q180,278 240,270 Q300,262 360,270 Q420,278 480,270" stroke="#e08030" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M0,285 Q80,277 160,285 Q240,293 320,285 Q400,277 480,285" stroke="#d07020" stroke-width="1.2" fill="none" opacity="0.3"/>

  <!-- Etiquetas capas -->
  <rect x="4" y="101" width="110" height="14" rx="3" fill="rgba(255,255,255,0.7)"/>
  <text x="8" y="112" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#7a5a20">Rocas Sedimentarias</text>

  <rect x="4" y="148" width="95" height="14" rx="3" fill="rgba(255,255,255,0.7)"/>
  <text x="8" y="159" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#7a5a30">Granito (Sial)</text>

  <rect x="4" y="218" width="105" height="14" rx="3" fill="rgba(255,255,255,0.7)"/>
  <text x="8" y="229" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fff">Basalto inferior</text>

  <!-- Etiqueta MOHO -->
  <rect x="148" y="250" width="170" height="16" rx="4" fill="#ff6020" opacity="0.9"/>
  <text x="155" y="261" font-family="system-ui,sans-serif" font-size="10.5" font-weight="700" fill="white">— Discontinuidad de Moho —</text>

  <rect x="4" y="265" width="80" height="14" rx="3" fill="rgba(180,80,20,0.7)"/>
  <text x="8" y="276" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#ffe0b0">Manto Superior</text>

  <!-- Escala de profundidad (derecha) -->
  <line x1="460" y1="100" x2="460" y2="320" stroke="#555" stroke-width="1.5" opacity="0.6"/>
  <line x1="455" y1="100" x2="465" y2="100" stroke="#555" stroke-width="1.5" opacity="0.6"/>
  <text x="468" y="104" font-family="system-ui,sans-serif" font-size="9" fill="#444">0 km</text>
  <line x1="455" y1="138" x2="465" y2="138" stroke="#555" stroke-width="1" opacity="0.5"/>
  <text x="468" y="142" font-family="system-ui,sans-serif" font-size="9" fill="#444">~5</text>
  <line x1="455" y1="258" x2="465" y2="258" stroke="#ff6020" stroke-width="1.5"/>
  <text x="468" y="262" font-family="system-ui,sans-serif" font-size="9" fill="#ff6020" font-weight="700">35 km</text>

  <!-- Título -->
  <rect x="0" y="0" width="480" height="0" fill="none"/>
  <rect x="156" y="68" width="170" height="22" rx="5" fill="rgba(20,30,10,0.65)"/>
  <text x="241" y="82" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">Corteza Continental</text>

  <!-- Indicador grosor -->
  <line x1="445" y1="100" x2="445" y2="258" stroke="#8b9e6a" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)" opacity="0.8"/>
  <text x="433" y="185" font-family="system-ui,sans-serif" font-size="9" fill="#8b9e6a" transform="rotate(-90,433,185)" text-anchor="middle">35 km promedio</text>
</svg>
